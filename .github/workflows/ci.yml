name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --------------------------------------------------
  # 軽量チェック（セットアップ不要）
  # --------------------------------------------------
  editorconfig:
    name: EditorConfig
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Run editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@main

      - run: editorconfig-checker

  # --------------------------------------------------
  # コード品質チェック
  # --------------------------------------------------
  lint:
    name: Biome lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Run Biome check
        run: pnpm lint

  check-types:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Run type check
        run: pnpm check-types

  knip:
    name: Knip (unused code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Run Knip
        run: pnpm knip

  syncpack:
    name: Syncpack (dependency consistency)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Check dependency version consistency
        run: pnpm package:lint

      - name: Check package.json formatting
        run: pnpm package:format

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Collect coverage reports
        if: always()
        run: pnpm --filter=vitest-app collect-coverage

  test-e2e:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Install Playwright browsers
        run: cd apps/playwright && pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  storybook-build:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Build Storybook
        run: pnpm storybook:build

  # --------------------------------------------------
  # ビルド（品質チェック通過後）
  # --------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, check-types, knip, syncpack, test, test-e2e, storybook-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Build application
        uses: ./.github/actions/build-app
